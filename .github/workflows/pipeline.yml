name: SecureSnitch CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: securesnitch-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: securesnitch-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: securesnitch-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: securesnitch-windows-x86_64

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libgtk-3-dev pkg-config upx protobuf-compiler

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install upx protobuf
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install upx protoc
          echo "PROTOC=protoc" >> $GITHUB_ENV

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Pack Binaries with UPX (Anti-Disassembly)
        shell: bash
        run: |
          DAEMON_BINARY="target/${{ matrix.target }}/release/${{ matrix.os == 'windows-latest' && 'daemon.exe' || 'daemon' }}"
          UI_BINARY="target/${{ matrix.target }}/release/${{ matrix.os == 'windows-latest' && 'ui.exe' || 'ui' }}"
          
          # Rename for clarity in release
          mv "$DAEMON_BINARY" "target/${{ matrix.target }}/release/securesnitch-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          mv "$UI_BINARY" "target/${{ matrix.target }}/release/securesnitch-ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          
          upx --ultra-brute "target/${{ matrix.target }}/release/securesnitch-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}" || echo "UPX failed for daemon"
          upx --ultra-brute "target/${{ matrix.target }}/release/securesnitch-ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}" || echo "UPX failed for UI"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/securesnitch-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            target/${{ matrix.target }}/release/securesnitch-ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            securesnitch-linux-x86_64/*
            securesnitch-macos-x86_64/*
            securesnitch-macos-arm64/*
            securesnitch-windows-x86_64/*
          generate_release_notes: true
