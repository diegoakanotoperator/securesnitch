name: SecureSnitch CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: securesnitch-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: securesnitch-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: securesnitch-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: securesnitch-windows-x86_64

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libgtk-3-dev pkg-config upx protobuf-compiler

      - name: Install Dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install upx protobuf
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> $GITHUB_ENV

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install upx protoc
          echo "PROTOC=protoc" >> $GITHUB_ENV

      - name: Run Tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Pack Binaries with UPX (Anti-Disassembly)
        shell: bash
        run: |
          # Use target-specific paths
          DAEMON_BINARY="target/${{ matrix.target }}/release/daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          UI_BINARY="target/${{ matrix.target }}/release/ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          
          # Rename for clarity in release
          mv "$DAEMON_BINARY" "target/${{ matrix.target }}/release/securesnitch-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          mv "$UI_BINARY" "target/${{ matrix.target }}/release/securesnitch-ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          
          upx --ultra-brute "target/${{ matrix.target }}/release/securesnitch-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}" || echo "UPX failed for daemon"
          upx --ultra-brute "target/${{ matrix.target }}/release/securesnitch-ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}" || echo "UPX failed for UI"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/securesnitch-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}
            target/${{ matrix.target }}/release/securesnitch-ui${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  package-linux:
    name: Package Linux (DEB, RPM)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: securesnitch-linux-x86_64
          path: target/release/
      
      - name: Rename binaries back for packaging tools
        run: |
          mv target/release/securesnitch-daemon target/release/daemon
          mv target/release/securesnitch-ui target/release/ui

      - name: Install Packaging Tools
        run: |
          cargo install cargo-deb cargo-generate-rpm
          sudo apt-get update && sudo apt-get install -y rpm
      
      - name: Build DEB (Daemon)
        run: cd daemon && cargo deb --no-build
      - name: Build DEB (UI)
        run: cd ui && cargo deb --no-build
      
      - name: Build RPM (Daemon)
        run: cd daemon && cargo generate-rpm --no-build
      - name: Build RPM (UI)
        run: cd ui && cargo generate-rpm --no-build

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, package-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            securesnitch-linux-x86_64/*
            securesnitch-macos-x86_64/*
            securesnitch-macos-arm64/*
            securesnitch-windows-x86_64/*
            linux-packages/*.deb
            linux-packages/*.rpm
          generate_release_notes: true
